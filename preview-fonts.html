<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vocablet Font Preview</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #F5F5F0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: sans-serif;
    gap: 20px;
  }

  /* Simulate iOS nav bar */
  .phone {
    width: 390px;
    background: #F5F5F0;
    border-radius: 40px;
    overflow: hidden;
    box-shadow: 0 8px 40px rgba(0,0,0,0.12);
    border: 8px solid #e0ddd8;
  }

  .navbar {
    background: rgba(245,245,240,0.95);
    border-bottom: 0.5px solid #ddd;
    height: 52px;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    padding: 0 16px;
  }

  .title {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-weight: 700;
    font-size: 12px;
    letter-spacing: 0.15em;
    text-transform: capitalize;
    color: #4A4543;
  }

  .nav-btn {
    position: absolute;
    font-size: 22px;
    color: #7EC8A4;
  }
  .nav-btn.right { right: 16px; }

  .content {
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .list-item {
    background: white;
    border-radius: 12px;
    padding: 14px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    font-family: -apple-system, sans-serif;
    color: #4A4543;
    font-size: 16px;
  }

  .icon {
    width: 32px; height: 32px;
    border-radius: 8px;
    background: #7EC8A4;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; color: white;
  }

  .section-header {
    font-family: -apple-system, sans-serif;
    font-size: 13px;
    font-weight: 500;
    color: #A09880;
    padding: 4px 4px 2px;
  }
</style>
</head>
<body>

<div class="phone">
  <div class="navbar">
    <span class="title">Vocablet</span>
    <span class="nav-btn right">⊕</span>
  </div>
  <div class="content">
    <div class="list-item">
      <div class="icon">📚</div>
      All Words
    </div>
    <div class="section-header">Booklets</div>
    <div class="list-item">
      <div class="icon" style="background:#A8C8E8">📖</div>
      Daily English
    </div>
  </div>
</div>

</body>
</html>
